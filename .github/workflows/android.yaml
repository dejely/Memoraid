name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        working-directory: my-app
        run: npm ci

      - name: Typecheck
        working-directory: my-app
        run: npm run typecheck

      - name: Prebuild Android project
        working-directory: my-app
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        working-directory: my-app
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android :app:assembleRelease -x lint -x test --stacktrace --console=plain

      - name: Prepare APK artifact
        id: artifact
        run: |
          mkdir -p dist
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            APK_NAME="Memoraid-${GITHUB_REF_NAME}.apk"
          else
            APK_NAME="Memoraid-${GITHUB_SHA::7}.apk"
          fi
          cp my-app/android/app/build/outputs/apk/release/app-release.apk "dist/${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/${{ steps.artifact.outputs.apk_name }}
          if-no-files-found: error

      - name: Upload Android reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-reports
          path: |
            my-app/android/build/reports
            my-app/android/app/build/reports
          if-no-files-found: ignore

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.artifact.outputs.apk_name }}
          generate_release_notes: true