name: Build Release APK

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-release-apk-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: true
      RELEASE_TAG: ${{ github.event.release.tag_name || format('manual-{0}', github.run_number) }}
    steps:
      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0

          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project with Expo prebuild
        run: npx expo prebuild -p android --no-install --clean

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Configure Android signing properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat <<EOF >> android/gradle.properties
          MEMORAID_UPLOAD_STORE_FILE=release.keystore
          MEMORAID_UPLOAD_KEY_ALIAS=${ANDROID_KEY_ALIAS}
          MEMORAID_UPLOAD_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}
          MEMORAID_UPLOAD_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Patch generated Gradle config for release signing
        run: node .github/scripts/configure-android-signing.mjs

      - name: Build signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew app:assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
            android/app/build/outputs/apk/release/memoraid-${RELEASE_TAG}.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: memoraid-apk-${{ env.RELEASE_TAG }}
          path: android/app/build/outputs/apk/release/memoraid-${{ env.RELEASE_TAG }}.apk
          if-no-files-found: error

      - name: Attach APK to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/memoraid-${{ env.RELEASE_TAG }}.apk
          overwrite_files: true
